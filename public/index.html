<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personen-Auskunft</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Datenbank-Auskunft</h1>
            <p>Personenabfrage über Windows Authentication</p>
        </header>

        <main>
            <div id="person-card" class="card">
                <div class="loader" id="loader"></div>
                <div id="data-container" class="hidden">
                    <div class="field">
                        <span class="label">Vorname</span>
                        <h2 id="firstname">-</h2>
                    </div>
                    <div class="field">
                        <span class="label">Nachname</span>
                        <h2 id="lastname">-</h2>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>EmpowerID Development Support</p>
        </footer>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const dataContainer = document.getElementById('data-container');
        const firstNameEl = document.getElementById('firstname');
        const lastNameEl = document.getElementById('lastname');

        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 8000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            const response = await fetch(resource, {
                ...options,
                signal: controller.signal
            });
            clearTimeout(id);
            return response;
        }

        async function init() {
            try {
                // 0. Server-Ping (läuft der Node-Prozess überhaupt?)
                updateStatus("Prüfe Webserver...");
                const pingResponse = await fetchWithTimeout('/api/ping');
                if (!pingResponse.ok) throw new Error("Server antwortet nicht korrekt.");

                // 1. Health Check
                updateStatus("Prüfe Datenbankverbindung (ID 1)...");
                const healthResponse = await fetchWithTimeout('/api/health');
                const healthData = await healthResponse.json();

                if (healthData.status !== 'connected') {
                    throw new Error("Datenbank nicht erreichbar: " + healthData.message);
                }

                // 2. Fetch Data
                updateStatus("Lade Personendaten...");
                const response = await fetchWithTimeout('/api/person');
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText);
                }
                
                const data = await response.json();
                
                firstNameEl.innerText = data.Firstname;
                lastNameEl.innerText = data.Lastname;
                
                loader.classList.add('hidden');
                dataContainer.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                loader.innerHTML = `<span style="color: #ef4444; font-size: 0.9rem;">${error.message}</span>`;
                loader.style.animation = "none";
                loader.style.border = "none";
                loader.style.width = "auto";
                loader.style.height = "auto";
            }
        }

        function updateStatus(msg) {
            loader.innerHTML = `<div class="spinner"></div><p style="font-size: 0.8rem; margin-top: 10px;">${msg}</p>`;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
